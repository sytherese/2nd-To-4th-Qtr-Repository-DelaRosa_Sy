<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reset Password</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1f2b3b;
font-family:monospace;
}

.box{
background:#dcdcdc;
padding:30px;
width:320px;
border:3px solid #000;
color:#000;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#111;
color:#fff;
}
</style>
</head>

<body>

<div class="box">
<h2>RESET PASSWORD</h2>

<input id="email" placeholder="Email">
<input id="newpass" type="password" placeholder="New Password">

<button onclick="reset()">UPDATE</button>
</div>

<script>
function reset(){
let user = JSON.parse(localStorage.getItem("user"));

if(user && user.email === email.value){
user.password = newpass.value;
localStorage.setItem("user", JSON.stringify(user));
location.href="login.html";
}else{
alert("User not found");
}
}
</script>

</body>
</html>
