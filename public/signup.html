<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signup - Case Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mainstyles.css">

<style>
/* ...existing code... */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1f2b3b;
font-family:'Courier New', monospace;
color:#fff;
overflow:hidden;
}

/* keep only the page-specific container styles here; sidebar styles come from mainstyles.css */
.container{
background:#dcdcdc;
padding:30px;
width:360px;
border:3px solid #000;
box-shadow:6px 6px 0 #000;
color:#000;
}

h1{
font-family:'Special Elite';
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:2px solid #333;
}

button.primary{
width:100%;
padding:10px;
background:#1f2b3b;
color:#fff;
border:none;
cursor:pointer;
}

a{
font-size:11px;
color:gray;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<!-- header toggle + sidebar (matches mainpage structure & classes) -->
<button class="header-toggle" id="sidebarToggle">
    <img src="../assets/b99logo.png" alt="Menu">
</button>

<aside class="header-sidebar" id="sidebar">
    <a href="../index.html">Main Page</a>
    <a href="episodes.html">Episodes</a>
    <a href="production.html">Production</a>
    <a href="signup.html">Solve a Case</a> <!-- leads to signup terminal first -->
</aside>

<div class="header-backdrop" id="sidebarBackdrop"></div>

<div class="container">
<h1>CASE SIGNUP</h1>

<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="primary" onclick="signup()">CREATE ACCOUNT</button>

<p><a href="login.html">Already have an account?</a></p>
<p><a href="home.html">Continue as Guest</a></p>
</div>

<script>
/* ...existing code... */
function signup(){
localStorage.setItem("user", JSON.stringify({
username: username.value,
email: email.value,
password: password.value
}));

location.href="login.html";
}
</script>

<!-- reuse centralized scripts for sidebar toggle and other behaviors -->
<script src="scripts.js"></script>

</body>
</html>
