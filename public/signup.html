<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign Up - Brooklyn 99 Case Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter&display=swap" rel="stylesheet" />
<style>
  body {
    font-family: 'Courier New', monospace;
    background-color: #1f2b3b;
    color: #e1e1e1;
    margin: 0; padding: 0;
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    background-image: url('grunge_texture.jpg');
    background-size: cover;
    background-attachment: fixed;
  }
  .signup-container {
    background-color: #dcdcdc;
    border: 3px solid #000;
    box-shadow: 6px 6px 0 #000;
    padding: 30px 40px;
    width: 360px;
  }
  h1 {
    font-family: 'Special Elite', cursive;
    font-size: 28px;
    margin-bottom: 20px;
    color: #111;
    text-align: center;
    user-select: none;
  }
  label {
    display: block;
    margin-bottom: 6px;
    color: #444;
    font-weight: bold;
  }
  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 18px;
    border: 2px solid #444;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    color: #000;
  }
  input[type=submit] {
    width: 100%;
    background-color: #1f2b3b;
    color: #e1e1e1;
    border: none;
    padding: 12px 0;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    transition: background-color 0.3s ease;
    user-select: none;
  }
  input[type=submit]:hover {
    background-color: #2e3a47;
  }
  .error-message {
    color: #b23030;
    font-weight: bold;
    margin-bottom: 12px;
    display: none;
  }
</style>
</head>
<body>
  <div class="signup-container">
    <h1>B99 Case Terminal Signup</h1>
    <form id="signupForm" autocomplete="off" novalidate>
      <div class="error-message" id="errorMessage"></div>

      <label for="username">Username *</label>
      <input type="text" id="username" name="username" maxlength="30" required />

      <label for="fullname">Full Name *</label>
      <input type="text" id="fullname" name="fullname" maxlength="60" required />

      <label for="email">Email *</label>
      <input type="email" id="email" name="email" maxlength="60" required />

      <label for="password">Password *</label>
      <input type="password" id="password" name="password" minlength="6" maxlength="30" required />

      <label for="confirmPassword">Confirm Password *</label>
      <input type="password" id="confirmPassword" name="confirmPassword" minlength="6" maxlength="30" required />

      <input type="submit" value="Create Account" />
    </form>
  </div>

<script>
  const form = document.getElementById('signupForm');
  const errorMessage = document.getElementById('errorMessage');

  form.addEventListener('submit', e => {
    e.preventDefault();

    const username = form.username.value.trim();
    const fullname = form.fullname.value.trim();
    const email = form.email.value.trim();
    const password = form.password.value;
    const confirmPassword = form.confirmPassword.value;

    if (!username || !fullname || !email || !password || !confirmPassword) {
      showError('Please fill in all required fields.');
      return;
    }
    if (password !== confirmPassword) {
      showError('Passwords do not match.');
      return;
    }
    // Simple email format check
    if (!validateEmail(email)) {
      showError('Please enter a valid email address.');
      return;
    }

    // Save user info to localStorage (simulate login)
    const userData = { username, fullname, email };
    localStorage.setItem('b99_user', JSON.stringify(userData));

    alert(`Welcome, ${fullname}! Your account has been created.`);

    // Redirect to notes page (or main page)
    window.location.href = 'notes.html';
  });

  function showError(msg) {
    errorMessage.textContent = msg;
    errorMessage.style.display = 'block';
  }

  function validateEmail(email) {
    // Basic regex for email validation
    const re = /\S+@\S+\.\S+/;
    return re.test(email);
  }
</script>

</body>
</html>
