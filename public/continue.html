<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Continue Cases</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
/* ...existing code... */
body{
margin:0;
background:#1f2b3b;
font-family:monospace;
color:#fff;
}

.header{
text-align:center;
padding:20px;
font-family:'Special Elite';
}

.search{
width:60%;
display:block;
margin:10px auto;
padding:10px;
border:2px solid #000;
background:#dcdcdc;
}

.container{
height:75vh;
overflow-y:auto;
padding:10px;
}

.slot{
background:#dcdcdc;
color:#000;
padding:15px;
margin:10px auto;
width:70%;
border:2px solid #000;
box-shadow:4px 4px 0 #000;
position:relative;
}

.title{
font-weight:bold;
}

.info{
font-size:12px;
opacity:0.8;
margin-top:5px;
}

.btn{
position:absolute;
top:10px;
padding:5px;
border:none;
cursor:pointer;
font-size:11px;
}

.load{ right:10px; background:#1f2b3b; color:#fff; }
.edit{ right:70px; background:#444; color:#fff; }
.delete{ right:130px; background:#8b0000; color:#fff; }

input.edit-input{
display:none;
width:90%;
padding:5px;
}

/* simple top-right back button */
.back-btn{
position:fixed;
top:12px;
right:12px;
padding:8px 10px;
background:#dcdcdc;
border:3px solid #000;
color:#000;
cursor:pointer;
box-shadow:2px 2px 0 #000;
z-index:10000;
}
</style>
</head>

<body>

<!-- back to home -->
<button class="back-btn" onclick="location.href='home.html'">HOME</button>

<div class="header">
<h1>CASE ARCHIVE</h1>
<p>Select or manage saved cases</p>

<input class="search" id="search" placeholder="Search cases..." oninput="filter()">
</div>

<div class="container" id="list"></div>

<script>

let user = JSON.parse(localStorage.getItem("b99_user"));
let key = "b99_save_" + (user?.email || "guest");

let saves = JSON.parse(localStorage.getItem(key)) || [];

let list = document.getElementById("list");

function render(){

list.innerHTML = "";

saves.forEach((s,i)=>{

let div = document.createElement("div");
div.className = "slot";

div.innerHTML = `
<div class="title" id="t${i}">${s.name}</div>
<input class="edit-input" id="i${i}" value="${s.name}">

<div class="info">
Last saved: ${s.time}<br>
Status: ${s.status}
</div>

<button class="btn load" onclick="loadCase(${i})">LOAD</button>
<button class="btn edit" onclick="editCase(${i})">EDIT</button>
<button class="btn delete" onclick="deleteCase(${i})">DEL</button>
`;

list.appendChild(div);

});

}

function loadCase(i){
localStorage.setItem("active_case", JSON.stringify(saves[i]));
window.location.href = "mainpage.html";
}

function editCase(i){

let input = document.getElementById("i"+i);
let title = document.getElementById("t"+i);

if(input.style.display === "block"){
saves[i].name = input.value;
localStorage.setItem(key, JSON.stringify(saves));
render();
}else{
input.style.display = "block";
title.style.display = "none";
}
}

function deleteCase(i){
saves.splice(i,1);
localStorage.setItem(key, JSON.stringify(saves));
render();
}

function filter(){
let q = search.value.toLowerCase();
document.querySelectorAll(".slot").forEach(s=>{
s.style.display = s.innerText.toLowerCase().includes(q) ? "block":"none";
});
}

render();

</script>

</body>
</html>
